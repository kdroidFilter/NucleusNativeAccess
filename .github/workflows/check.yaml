name: Check

on:
  pull_request:
    branches:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Cache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnotify-dev libglib2.0-dev libdbusmenu-glib-dev libpipewire-0.3-dev

      - name: Build calculator (compile tests without running)
        run: ./gradlew :examples:calculator:jvmTestClasses :examples:calculator:compileNativeMainKotlinMetadata

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - CoreTest
          - EnumTest
          - ObjectTest
          - NullableTest
          - DataClassTest
          - NestedDataClassTest
          - CallbackTest
          - NestedClassTest
          - FlowTest
          - LoadAndConcurrencyTest
          - CollectionTest
          - EdgeCaseTest
          - SuspendFunctionTest
          - FlowDataClassTest
          - SuspendDataClassTest
          - SuspendCollectionTest
          - ListDataClassParamTest
          - DcCollectionFieldTest
          - CollectionPropertyTest
          - NullableCallbackTest
          - FlowCollectionTest
          - NestedCollectionTest
          - FlowByteArrayTest
          - ByteArrayEverywhereTest
          - LambdaReturnTest
          - SuspendEdgeCaseTest
          - CoroutineCrossFeatureTest
          - AsyncCallbackTest
          - AsyncCoreTest
          - AsyncCollectionTest
          - AsyncDataClassEnumTest
          - AsyncSuspendFlowTest
          - InterfaceTest
          - ExtensionFunctionTest
          - InheritanceTest
          - SealedClassTest
          - InheritanceEdgeCaseTest
          - AsyncInheritanceTest
          - LoadInheritanceTest
    name: "Test: ${{ matrix.test }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnotify-dev libglib2.0-dev libdbusmenu-glib-dev libpipewire-0.3-dev

      - name: "Run ${{ matrix.test }}"
        run: ./gradlew :examples:calculator:jvmTest --tests "com.example.calculator.${{ matrix.test }}"
